version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
    groups:
      frontend-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
    groups:
      backend-dependencies:
        patterns:
          - "*"
